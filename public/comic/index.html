<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f0d8" />
    <meta name="description" content="NA SIGNALA — an interactive comic about how a big broadcast travels from a stadium to your screen." />
    <title>NA SIGNALA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#comic-reader">Skip to the comic</a>
    <header class="site-header">
      <div class="brand-lockup" aria-label="NA SIGNALA">
        <span class="brand-pip" aria-hidden="true">◆</span>
        <div>
          <p class="brand-kicker">JOEY AS PACKET TRACER PRESENTS</p>
          <p class="brand-title">NA SIGNALA</p>
        </div>
      </div>
      <button id="audio-toggle" class="ink-button audio-toggle" type="button" hidden aria-pressed="false">
        <span aria-hidden="true">▶</span><span class="audio-label">Read aloud</span>
      </button>
    </header>

    <main id="comic-reader" class="reader" tabindex="-1">
      <div id="loading" class="loading-card" role="status">
        <span class="loading-pip" aria-hidden="true">◆</span>
        <strong>Finding the signal…</strong>
      </div>

      <article id="comic" class="comic" hidden aria-live="off">
        <header class="chapter-heading">
          <div>
            <p id="chapter-eyebrow" class="chapter-eyebrow"></p>
            <h1 id="chapter-title"></h1>
          </div>
          <p id="panel-count" class="panel-count" aria-live="polite"></p>
        </header>

        <section id="panel-stage" class="panel-stage" aria-labelledby="panel-heading">
          <h2 id="panel-heading" class="sr-only" tabindex="-1"></h2>
          <div id="panel-frame" class="panel-frame">
            <div id="art-box" class="art-box"></div>
            <div id="bubble-layer" class="bubble-layer"></div>
            <div id="hotspot-layer" class="hotspot-layer"></div>
            <div id="more-layer" class="more-layer" hidden></div>
          </div>
          <p id="narration-text" class="narration-text" hidden></p>
          <div id="transcript" class="transcript" aria-label="Panel dialogue"></div>
          <div id="toy-mount" class="toy-mount"></div>
          <p id="audio-status" class="quiet-status" role="status"></p>
        </section>

        <nav class="reader-controls" aria-label="Comic navigation">
          <button id="previous-button" class="ink-button nav-button" type="button">
            <span aria-hidden="true">←</span> Back
          </button>
          <button id="more-button" class="ink-button more-button" type="button" aria-pressed="false">
            <span aria-hidden="true">↻</span> Tell me more
          </button>
          <button id="next-button" class="ink-button nav-button nav-next" type="button">
            Next <span aria-hidden="true">→</span>
          </button>
        </nav>
        <p class="keyboard-hint">Tap the art, swipe, or use ← → keys</p>
      </article>

      <section id="error-card" class="error-card" hidden role="alert">
        <h1>The signal got tangled.</h1>
        <p id="error-message">The comic could not be loaded.</p>
      </section>
    </main>

    <aside id="pip-meter" class="pip-meter" aria-label="Reading progress" style="--progress: 0%">
      <div class="pip-track" aria-hidden="true"><span></span></div>
      <div class="pip-character" aria-hidden="true">
        <span class="pip-antenna"></span><span class="pip-eye eye-left"></span><span class="pip-eye eye-right"></span><span class="pip-smile"></span>
      </div>
      <span id="pip-count" class="pip-count">1 / 1</span>
    </aside>

    <div id="glossary-backdrop" class="glossary-backdrop" hidden></div>
    <section id="glossary-card" class="glossary-card" hidden role="dialog" aria-modal="true" aria-labelledby="glossary-title">
      <button id="glossary-close" class="close-button" type="button" aria-label="Close glossary card">×</button>
      <p class="glossary-kicker">TOUCH THE TECH</p>
      <h2 id="glossary-title"></h2>
      <p id="glossary-short" class="glossary-short"></p>
      <div id="glossary-long" class="glossary-long" hidden></div>
      <button id="glossary-more" class="ink-button glossary-more" type="button" aria-expanded="false">Tell me more</button>
    </section>

    <footer class="site-footer">Not affiliated with FIFA — an educational comic about big broadcast engineering</footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
